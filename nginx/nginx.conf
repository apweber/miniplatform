# =============================================================================
# nginx.conf — reverse proxy for MiniPlatform
#
# Routing:
#   GET /          → serves /usr/share/nginx/html/index.html (static landing page)
#   GET /api/*     → proxied upstream to the FastAPI app on port 8000
#   GET /health    → Nginx's own stub health check (used by Docker health probe)
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Structured access log — easier to parse with log aggregators (Week 4)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip for text responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ---------------------------------------------------------------------------
    # Upstream: the FastAPI container is reachable by its Compose service name
    # ---------------------------------------------------------------------------
    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Static landing page ──────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # ── API proxy ────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        # ── Nginx stub health check ──────────────────────────────────────────
        location /health {
            stub_status on;
            access_log  off;
        }

        # ── Block hidden files (.env, .git, etc.) ───────────────────────────
        location ~ /\. {
            deny all;
        }
    }
}

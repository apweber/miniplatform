# =============================================================================
# docker-compose.override.yml — local development overrides
#
# Docker Compose automatically merges this file with docker-compose.yml
# when you run `docker compose up`. It is NOT used in CI or production.
#
# Changes from production:
#   - app source is bind-mounted so edits reload without rebuilding
#   - app port 8000 is exposed directly for debugging without Nginx
#   - redis port 6379 is exposed for inspection with redis-cli
#   - APP_ENV set to "development"
# =============================================================================

services:

  app:
    build:
      target: builder          # use builder stage for dev (has gcc etc.)
    volumes:
      - ./app:/app             # live mount — edit main.py, uvicorn reloads
    command:
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload               # hot reload on file change
    ports:
      - "8000:8000"            # direct access: http://localhost:8000/docs
    environment:
      APP_ENV: development

  redis:
    ports:
      - "6379:6379"            # inspect with: redis-cli -h localhost

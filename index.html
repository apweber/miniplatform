<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniPlatform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 1.25rem;
    }

    h1 { font-size: 28px; font-weight: 600; margin-bottom: 0.5rem; }
    p  { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 1.5rem; }

    .endpoints {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 2rem;
      text-align: left;
    }

    .endpoint {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .endpoint:hover { border-color: #4f6ef7; }

    .method {
      font-size: 11px;
      font-weight: 700;
      color: #34d399;
      background: #022c22;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .path   { font-family: monospace; font-size: 14px; color: #e2e8f0; }
    .desc   { font-size: 12px; color: #64748b; margin-left: auto; white-space: nowrap; }

    .status { display: flex; align-items: center; gap: 8px; justify-content: center; font-size: 13px; color: #64748b; }
    .dot    { width: 8px; height: 8px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Week 2 · Docker</span>
    <h1>MiniPlatform</h1>
    <p>A three-service Docker Compose stack: FastAPI + Redis + Nginx.<br>
       Part of the Phase 1 DevOps foundations capstone.</p>

    <div class="endpoints">
      <a class="endpoint" href="/api/data">
        <span class="method">GET</span>
        <span class="path">/api/data</span>
        <span class="desc">cached payload</span>
      </a>
      <a class="endpoint" href="/api/health">
        <span class="method">GET</span>
        <span class="path">/api/health</span>
        <span class="desc">readiness probe</span>
      </a>
      <a class="endpoint" href="/health">
        <span class="method">GET</span>
        <span class="path">/health</span>
        <span class="desc">liveness probe</span>
      </a>
      <a class="endpoint" href="/metrics">
        <span class="method">GET</span>
        <span class="path">/metrics</span>
        <span class="desc">prometheus</span>
      </a>
    </div>

    <div class="status">
      <span class="dot"></span>
      All services running
    </div>
  </div>
</body>
</html>

# =============================================================================
# health_check.conf — Configuration for health_check.sh
#
# Copy this file to the same directory as health_check.sh.
# All values here override the script's built-in defaults.
# Lines starting with # are comments and are ignored.
# =============================================================================

# ---------------------------------------------------------------------------
# Log file path
# The directory will be created if it doesn't exist.
# ---------------------------------------------------------------------------
LOG_FILE="/var/log/miniplatform/health.log"

# ---------------------------------------------------------------------------
# CPU thresholds (percent)
# CPU reading is an average over CPU_SAMPLES consecutive seconds.
# ---------------------------------------------------------------------------
CPU_WARN_PCT=75
CPU_CRIT_PCT=90
CPU_SAMPLES=3

# ---------------------------------------------------------------------------
# Memory thresholds (percent of total RAM used)
# ---------------------------------------------------------------------------
MEM_WARN_PCT=80
MEM_CRIT_PCT=95

# ---------------------------------------------------------------------------
# Disk thresholds (percent of filesystem used)
# DISK_PATH is the mount point to check.
# ---------------------------------------------------------------------------
DISK_WARN_PCT=75
DISK_CRIT_PCT=90
DISK_PATH="/"

# ---------------------------------------------------------------------------
# Services to check (systemd unit names, space-separated)
# ---------------------------------------------------------------------------
SERVICES="docker nginx"

# ---------------------------------------------------------------------------
# Alert cooldown
# Minimum seconds between repeat Slack alerts for the same check+severity.
# Prevents alert spam when a problem persists across multiple cron runs.
# ---------------------------------------------------------------------------
ALERT_COOLDOWN_SECS=300

# Directory where cooldown timestamps are stored (must be writable)
COOLDOWN_DIR="/tmp/health_check_cooldowns"

# ---------------------------------------------------------------------------
# Slack webhook (leave empty to disable Slack alerts)
#
# To enable: create an Incoming Webhook in your Slack workspace at
# https://api.slack.com/messaging/webhooks and paste the URL here.
#
# SECURITY: do NOT commit this file with a real webhook URL.
# Instead, set SLACK_WEBHOOK as an environment variable in your cron
# entry or use ansible-vault to manage this file.
# ---------------------------------------------------------------------------
SLACK_WEBHOOK=""
# Example (do not commit real URLs):
# SLACK_WEBHOOK="https://hooks.slack.com/services/T.../B.../..."

# ---------------------------------------------------------------------------
# Display hostname in alert messages (defaults to $(hostname -s))
# Override if you want a friendlier label in Slack.
# ---------------------------------------------------------------------------
# HOSTNAME_LABEL="miniplatform-prod"

# =============================================================================
# /etc/logrotate.d/miniplatform-health
#
# Rotates /var/log/miniplatform/health.log daily, keeping 14 days of history.
#
# Install:
#   sudo cp logrotate.conf /etc/logrotate.d/miniplatform-health
#   sudo logrotate -d /etc/logrotate.d/miniplatform-health   # dry-run test
# =============================================================================

/var/log/miniplatform/health.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root adm
    dateext
    dateformat -%Y-%m-%d
}
